properties:
  onera: # Combined Fredericksburg Basse 1 & 2 properties
    # Documentation: Defines configuration for the combined 'Onera' property.
    name: "Onera" # User-friendly name
    pms: cloudbeds
    total_units: 38 # Total units across all listings (12 from fb1 + 23 from fb2)
    listings:
      # Maps user-friendly listing names to their unique IDs used in data files.
      # Ensure these IDs match those in pl_daily_*.csv etc.
      # Original fb1 listings
      - {name: "Cocoon", id: "203812___362535", batna: 189.00}
      - {name: "Walnut House", id: "203812___364773", batna: 209.00}
      - {name: "Spyglass", id: "203812___364776", batna: 209.00}
      - {name: "Live Oak Lodge", id: "203812___364778", batna: 209.00}
      - {name: "Lantana Dome", id: "203812___364779", batna: 189.00}
      - {name: "Sage Safari", id: "203812___364780", batna: 189.00}
      - {name: "Monarch", id: "203812___364781", batna: 209.00}
      - {name: "Buckeye Bungalow", id: "203812___364782", batna: 189.00}
      - {name: "Cedar Haus", id: "203812___490007", batna: 169.00}
      - {name: "Juniper Haus", id: "203812___490024", batna: 169.00}
      - {name: "Pecan Haus", id: "203812___528745", batna: 169.00}
      - {name: "Bluebonnet", id: "203812___634080", batna: 189.00}
      # Original fb2 listings
      - {name: "Great Lodge", id: "203812___643757", units: 1, batna: 1352}
      - {name: "Great Lodge: King Room", id: "203812___643775", units: 6, batna: 169.00}
      - {name: "Great Lodge: King Room (Accessible)", id: "203812___657152", units: 2, batna: 169.00}
      - {name: "Cypress Lodge | Sleeps 2", id: "203812___655826", units: 2, batna: 169.00}
      - {name: "Cypress Lodge | Sleeps 4", id: "203812___643762", units: 2, batna: 229.00}
      - {name: "Cypress Lodge | Sleeps 6", id: "203812___655827", units: 2, batna: 229.00}
      - {name: "Diamond", id: "203812___643771", units: 3, batna: 229.00}
      - {name: "Monolith", id: "203812___643773", units: 2, batna: 229.00}
      - {name: "Post Oak", id: "203812___643760", units: 1, batna: 169.00}
      - {name: "Quonset", id: "203812___643764", units: 2, batna: 209.00}
      - {name: "Spiral", id: "203812___643772", units: 1, batna: 229.00}
      - {name: "Winecup", id: "203812___643766", units: 2, batna: 209.00}
    rate_group_mapping:
      # Maps internal rate group keys (used by calculator.py)
      # to the specific rate column NAMES in the rate_table_*.csv file.
      # AND maps these keys to the list of listing IDs they apply to.
      # Keys (e.g., rate_1) MUST match columns in the rate table CSV.
      # Reorganized to group similar pricing tiers together
      rate_1: ["203812___364781", "203812___364776", "203812___364778", "203812___364773"] # Original fb1 rate_1
      rate_2: ["203812___364780", "203812___362535", "203812___364782", "203812___364779", "203812___634080"] # Original fb1 rate_2
      rate_3: ["203812___490007", "203812___490024", "203812___528745"] # Original fb1 rate_3
      rate_4: ["203812___643772", "203812___643771"] # Original fb2 rate_1 (Spiral, Diamond)
      rate_5: ["203812___643766", "203812___643764"] # Original fb2 rate_2 (Winecup, Quonset)
      rate_6: ["203812___643757"] # Original fb2 rate_3 (Great Lodge)
      rate_7: ["203812___643775", "203812___657152"] # Original fb2 rate_4 (King Room variants)
      rate_8: ["203812___643773"] # Original fb2 rate_5 (Monolith)
      rate_9: ["203812___655826", "203812___643762", "203812___655827"] # Original fb2 rate_6 (Cypress Lodge units)
      rate_10: ["203812___643760"] # Original fb2 rate_7 (Post Oak)
    adjustment_rules:
      # Defines rules for adjusting rates based on conditions (e.g., adjacent day bookings).
      # Referenced by calculator.apply_adjustment_rules.
      - name: "Thursday Rate Adjustment (Fri Booked)"
        target_weekday: 3 # 0=Mon, 1=Tue, 2=Wed, 3=Thu, 4=Fri, 5=Sat, 6=Sun
        conditions:
          - {type: "adjacent_day_booked", day_offset: 1} # Check if Friday is booked
        actions:
          - condition: null # Default action if Friday booked
            multiplier: 1.1
            reference_day_offset: -1
            lookup_day_group: "Mon-Wed"
      - name: "Sunday Rate Adjustment (Sat Booked)"
        target_weekday: 6 # Sunday
        conditions:
          - {type: "adjacent_day_booked", day_offset: -1} # Check Saturday
        actions:
          - condition: null # Always apply if Saturday booked
            multiplier: 1.2
            reference_day_offset: 1 # Base rate on Monday's tier
            lookup_day_group: "Mon-Wed"
      - name: "Friday Orphan Adjustment"
        target_weekday: 4 # Friday
        conditions:
          - {type: "adjacent_day_booked", day_offset: -1} # Check if Thursday is booked
          - {type: "adjacent_day_booked", day_offset: 1}  # Check if Saturday is booked
        actions:
          - condition: null # Always apply if conditions met
            multiplier: 0.8
            reference_day_offset: 1 # Base rate on Saturday's tier
            lookup_day_group: "Fri-Sat" # Use Thu-Sun pricing group
      - name: "Saturday Booked - Thu/Fri Min Stay Reduction"
        target_weekday: 5 # Saturday
        conditions:
          - {type: "adjacent_day_booked", day_offset: 0} # Check if Saturday is booked
        actions:
          - condition: null # Always apply if Saturday booked
            min_stay_adjustment: 1 # Reduce min stay to 1 night
            target_adjacent_days: [-2, -1] # Thursday (-2) and Friday (-1)
            check_adjacent_weekday_los: true # Check Wednesday (day before Thursday) is at 1-night
      - name: "Saturday Booked - Sunday Min Stay Reduction"
        target_weekday: 5 # Saturday
        conditions:
          - {type: "adjacent_day_booked", day_offset: 0} # Check if Saturday is booked
        actions:
          - condition: null # Always apply if Saturday booked
            min_stay_adjustment: 1 # Reduce min stay to 1 night
            target_adjacent_days: [1] # Sunday (+1) only
            check_adjacent_weekday_los: true # Check Monday (day after Sunday) is at 1-night
    booking_window_definitions:
      # Defines labels and day ranges for booking windows.
      # Used by utils.get_booking_window_label.
      # Ensure ranges cover all possibilities and don't overlap.
      - { label: "0-9 Days (W1)", min_days: 0, max_days: 9 }
      - { label: "10-21 Days (W2)", min_days: 10, max_days: 21 }
      - { label: "22-30 Days (W3)", min_days: 22, max_days: 30 }
      - { label: "31-45 Days (W4)", min_days: 31, max_days: 45 }
      - { label: "46-59 Days (W5)", min_days: 46, max_days: 59 }
      - { label: "60-120 Days (W6)", min_days: 60, max_days: 120 }
      - { label: ">120 Days (W7)", min_days: 121, max_days: 9999 }
    urgency_band_definitions:
      # Defines labels and day ranges for urgency bands.
      # Used by utils.get_urgency_band.
      - { label: "0-1", min_days: 0, max_days: 1 }
      - { label: "2-3", min_days: 2, max_days: 3 }
      - { label: "4-6", min_days: 4, max_days: 6 }
      - { label: "7-9", min_days: 7, max_days: 9 }
    urgency_configuration:
      tier_groups: [ "T10-T12", "T13-T15"]
      booking_window_label: "W1"
      max_occupancy_pct: 30

