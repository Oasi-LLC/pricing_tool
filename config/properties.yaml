      - {name: "Spyglass Pet", id: "316005___633312", units: 6}
    rate_group_mapping:
      rate_1: ["316005___633306", "316005___633307"]
      rate_2: ["316005___633308"]
      rate_3: ["316005___633310", "316005___633311"]
      rate_4: ["316005___633312"]
    adjustment_rules:
