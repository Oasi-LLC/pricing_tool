properties:
  fb1: # Matches the directory name and --property argument
    # Documentation: Defines configuration for the 'fb1' property.
    name: "Fredericksburg Basse 1" # User-friendly name
    pms: cloudbeds
    listings:
      # Maps user-friendly listing names to their unique IDs used in data files.
      # Ensure these IDs match those in pl_daily_*.csv etc.
      - {name: "Cocoon", id: "203812___362535"}
      - {name: "Walnut House", id: "203812___364773"}
      - {name: "Spyglass", id: "203812___364776"}
      - {name: "Live Oak Lodge", id: "203812___364778"}
      - {name: "Lantana Dome", id: "203812___364779"}
      - {name: "Sage Safari", id: "203812___364780"}
      - {name: "Monarch", id: "203812___364781"}
      - {name: "Buckeye Bungalow", id: "203812___364782"}
      - {name: "Cedar Haus", id: "203812___490007"}
      - {name: "Juniper Haus", id: "203812___490024"}
      - {name: "Pecan Haus", id: "203812___528745"}
      - {name: "Bluebonnet", id: "203812___634080"}
    rate_group_mapping:
      # Maps internal rate group keys (used by calculator.py)
      # to the specific rate column NAMES in the rate_table_*.csv file.
      # AND maps these keys to the list of listing IDs they apply to.
      # Keys (e.g., rate_1) MUST match columns in the rate table CSV.
      rate_2: ["203812___364780", "203812___362535", "203812___364782", "203812___364779", "203812___634080"]
      rate_1: ["203812___364781", "203812___364776", "203812___364778", "203812___364773"]
      rate_3: ["203812___490007", "203812___490024", "203812___528745"]
    adjustment_rules:
      # Defines rules for adjusting rates based on conditions (e.g., adjacent day bookings).
      # Referenced by calculator.apply_adjustment_rules.
      - name: "Thursday Rate Adjustment (Fri Booked)"
        target_weekday: 3 # 0=Mon, 1=Tue, 2=Wed, 3=Thu, 4=Fri, 5=Sat, 6=Sun
        conditions:
          - {type: "adjacent_day_booked", day_offset: 1} # Check if Friday is booked
        actions:
          - condition: {type: "adjacent_day_booked", day_offset: -1} # If Wednesday is ALSO booked...
            multiplier: 1.2
            reference_day_offset: -1 # Base rate on Wednesday's tier
            lookup_day_group: "Mon-Wed" # Use Mon-Wed rules for lookup
          - condition: null # Default action if Friday booked but Wednesday NOT
            multiplier: 1.1
            reference_day_offset: -1
            lookup_day_group: "Mon-Wed"
      - name: "Sunday Rate Adjustment (Sat Booked)"
        target_weekday: 6 # Sunday
        conditions:
          - {type: "adjacent_day_booked", day_offset: -1} # Check Saturday
        actions:
          - condition: null # Always apply if Saturday booked
            multiplier: 1.2
            reference_day_offset: 1 # Base rate on Monday's tier
            lookup_day_group: "Mon-Wed"
      - name: "Friday Orphan Adjustment"
        target_weekday: 4 # Friday
        conditions:
          - {type: "adjacent_day_booked", day_offset: -1} # Check if Thursday is booked
          - {type: "adjacent_day_booked", day_offset: 1}  # Check if Saturday is booked
        actions:
          - condition: null # Always apply if conditions met
            multiplier: 0.8
            reference_day_offset: 1 # Base rate on Saturday's tier
            lookup_day_group: "Fri-Sat" # Use Thu-Sun pricing group
    booking_window_definitions:
      # Defines labels and day ranges for booking windows.
      # Used by utils.get_booking_window_label.
      # Ensure ranges cover all possibilities and don't overlap.
      - { label: "0-9 Days (W1)", min_days: 0, max_days: 9 }
      - { label: "10-21 Days (W2)", min_days: 10, max_days: 21 }
      - { label: "22-30 Days (W3)", min_days: 22, max_days: 30 }
      - { label: "31-45 Days (W4)", min_days: 31, max_days: 45 }
      - { label: "46-59 Days (W5)", min_days: 46, max_days: 59 }
      - { label: "60-120 Days (W6)", min_days: 60, max_days: 120 }
      - { label: ">120 Days (W7)", min_days: 121, max_days: 9999 }
    urgency_band_definitions:
      # Defines labels and day ranges for urgency bands.
      # Used by utils.get_urgency_band.
      - { label: "0-1", min_days: 0, max_days: 1 }
      - { label: "2-3", min_days: 2, max_days: 3 }
      - { label: "4-6", min_days: 4, max_days: 6 }
      - { label: "7-9", min_days: 7, max_days: 9 }
    urgency_configuration:
      tier_groups: [ "T10-T12", "T13-T15"]
      booking_window_label: "W1"
      max_occupancy_pct: 30

