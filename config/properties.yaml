  atx1:
    name: "Austin"
    pms: hostaway
    listings:
      - {name: "Romney", id: "320201", batna: 139.00}
      - {name: "Sunstrip", id: "320203", batna: 169.00}
      - {name: "Malvern", id: "389561", batna: 159.00}
    rate_group_mapping:
      rate_4: ["320203"] # Sunstrip
      rate_2: ["389561"] # Malvern
      rate_1: ["320201"] # Romney
    booking_window_definitions:
      - { label: "0-7 Days (W1)", min_days: 0, max_days: 7 }
      - { label: "8-30 Days (W2)", min_days: 8, max_days: 30 }
      - { label: "31-90 Days (W3)", min_days: 31, max_days: 90 }
      - { label: "91-180 Days (W4)", min_days: 91, max_days: 180 }
      - { label: "> 181 Days (W5)", min_days: 181, max_days: 9999 }
    urgency_band_definitions:
      - { label: "0-1", min_days: 0, max_days: 1 }
      - { label: "2-3", min_days: 2, max_days: 3 }
      - { label: "4-7", min_days: 4, max_days: 7 }
    urgency_configuration:
      tier_groups: ["T5-T6"]
      booking_window_label: "W1"
      max_occupancy_pct: 15
    adjustment_rules:
      - name: "Three Day Consecutive - Reduce Gap Days"
        target_weekday: 3 # Thursday
        conditions:
          - {type: "adjacent_day_booked", day_offset: 1} # Friday booked
          - {type: "adjacent_day_booked", day_offset: 2} # Saturday booked
          - {type: "adjacent_day_not_booked", day_offset: -1} # Thursday NOT booked
        actions:
          - condition: null # Apply when Thu+Fri+Sat are booked but Thu is not
            multiplier: 1.1 # 110% of Monday's rate
            reference_day_offset: -3 # Base rate on Monday's live rate
            lookup_day_group: "Mon-Wed"
      - name: "Three Day Consecutive - Reduce Gap Days"
        target_weekday: 6 # Sunday
        conditions:
          - {type: "adjacent_day_booked", day_offset: -2} # Friday booked
          - {type: "adjacent_day_booked", day_offset: -1} # Saturday booked
          - {type: "adjacent_day_not_booked", day_offset: 1} # Sunday NOT booked
        actions:
          - condition: null # Apply when Fri+Sat+Sun are booked but Sun is not
            multiplier: 1.2 # 120% of Wednesday's rate
            reference_day_offset: -4 # Base rate on Wednesday's live rate
            lookup_day_group: "Mon-Wed"
      - name: "Weekend Both Booked - Standard Adjustment"
        target_weekday: 3 # Thursday
        conditions:
          - {type: "adjacent_day_booked", day_offset: 1} # Friday booked
          - {type: "adjacent_day_booked", day_offset: 2} # Saturday booked
          - {type: "adjacent_day_booked", day_offset: -1} # Thursday also booked (not 3-day consecutive)
        actions:
          - condition: null # Apply when Fri+Sat are booked (standard weekend)
            multiplier: 1.1 # 110% of Monday's rate
            reference_day_offset: -3 # Base rate on Monday's live rate
            lookup_day_group: "Mon-Wed"
      - name: "Weekend Both Booked - Standard Adjustment"
        target_weekday: 6 # Sunday
        conditions:
          - {type: "adjacent_day_booked", day_offset: -2} # Friday booked
          - {type: "adjacent_day_booked", day_offset: -1} # Saturday booked
          - {type: "adjacent_day_booked", day_offset: 1} # Sunday also booked (not 3-day consecutive)
        actions:
          - condition: null # Apply when Fri+Sat are booked (standard weekend)
            multiplier: 1.2 # 120% of Wednesday's rate
            reference_day_offset: -4 # Base rate on Wednesday's live rate
            lookup_day_group: "Mon-Wed"
      - name: "Friday Only Booked - Enforce Two Night"
        target_weekday: 5 # Saturday
        conditions:
          - {type: "adjacent_day_booked", day_offset: -1} # Friday booked
          - {type: "adjacent_day_not_booked", day_offset: 0} # Saturday NOT booked (target day)
        actions:
          - condition: null # Apply when Friday booked but Saturday not
            los_adjustment: 2 # Set to 2-night minimum
      - name: "Saturday Only Booked - Enforce Two Night"
        target_weekday: 4 # Friday
        conditions:
          - {type: "adjacent_day_booked", day_offset: 1} # Saturday booked
          - {type: "adjacent_day_not_booked", day_offset: 0} # Friday NOT booked (target day)
        actions:
          - condition: null # Apply when Saturday booked but Friday not
            los_adjustment: 2 # Set to 2-night minimum

