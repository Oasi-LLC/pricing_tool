properties:
  fb1: # Matches the directory name and --property argument
    name: "Firefly Boutique 1" # Optional: User-friendly name
    listings:
      # Maps listing names to their IDs
      - name: "Cocoon"
        id: "203812___362535"
      - name: "Walnut House"
        id: "203812___364773"
      - name: "Spyglass"
        id: "203812___364776"
      - name: "Live Oak Lodge"
        id: "203812___364778"
      - name: "Lantana Dome"
        id: "203812___364779"
      - name: "Sage Safari"
        id: "203812___364780"
      - name: "Monarch"
        id: "203812___364781"
      - name: "Buckeye Bungalow"
        id: "203812___364782"
      - name: "Cedar Haus"
        id: "203812___490007"
      - name: "Juniper Haus"
        id: "203812___490024"
      - name: "Pecan Haus"
        id: "203812___528745"
      - name: "Bluebonnet"
        id: "203812___634080"
    rate_group_mapping:
      # Maps listing groups to rate column NAMES in data/fb1/rate_table_fb1.csv
      # !!! IMPORTANT: Ensure these column names match your CSV !!!
      # UPDATED: Now maps rate group keys to LISTING IDs
      rate_1: # Sage Safari, Cocoon, Buckeye Bungalow, Lantana Dome, Bluebonnet
        - "203812___364780"
        - "203812___362535"
        - "203812___364782"
        - "203812___364779"
        - "203812___634080"
      rate_2: # Monarch, Spyglass, Live Oak Lodge, Walnut House
        - "203812___364781"
        - "203812___364776"
        - "203812___364778"
        - "203812___364773"
      rate_3: # Cedar Haus, Juniper Haus, Pecan Haus
        - "203812___490007"
        - "203812___490024"
        - "203812___528745"
    adjustment_rules:
      - name: "Thursday Rate Adjustment (Fri Booked)"
        target_weekday: 3 # Thursday
        conditions:
          - type: "adjacent_day_booked"
            day_offset: 1 # Check Friday status
        actions:
          - condition: # If Wednesday is ALSO booked
              type: "adjacent_day_booked"
              day_offset: -1 # Check Wednesday status
            multiplier: 1.2
            reference_day_offset: -1 # Base rate on Wednesday's tier
            lookup_day_group: "Mon-Wed" # Lookup using Mon-Wed rules
          - condition: null # Default if Friday booked but Wednesday NOT booked
            multiplier: 1.1
            reference_day_offset: -1 # Base rate on Wednesday's tier
            lookup_day_group: "Mon-Wed" # Lookup using Mon-Wed rules

      - name: "Sunday Rate Adjustment (Sat Booked)"
        target_weekday: 6 # Sunday
        conditions:
          - type: "adjacent_day_booked"
            day_offset: -1 # Check Saturday status
        actions:
          - condition: null # Always apply if Saturday is booked
            multiplier: 1.2
            reference_day_offset: 1 # Base rate on Monday's tier
            lookup_day_group: "Mon-Wed" # Lookup using Mon-Wed rules

    # ADDED: Booking window definitions based on current utils.py logic
    booking_window_definitions:
      - { label: "0-9 Days (W1)", min_days: 0, max_days: 9 }
      - { label: "10-21 Days (W2)", min_days: 10, max_days: 21 }
      - { label: "22-30 Days (W3)", min_days: 22, max_days: 30 }
      - { label: "31-45 Days (W4)", min_days: 31, max_days: 45 }
      - { label: "46-59 Days (W5)", min_days: 46, max_days: 59 }
      - { label: "60-120 Days (W6)", min_days: 60, max_days: 120 }
      - { label: ">120 Days (W7)", min_days: 121, max_days: 9999 } # Use a large number for max

    # ADDED: Urgency band definitions based on current utils.py logic
    urgency_band_definitions:
      - { label: "0-1", min_days: 0, max_days: 1 }
      - { label: "2-3", min_days: 2, max_days: 3 }
      - { label: "4-6", min_days: 4, max_days: 6 }
      - { label: "7-9", min_days: 7, max_days: 9 }
      # Dates >= 10 days out have no urgency band (empty string returned by util)

