scheduler:
  data_range:
    end_date: managed_by_centralized_config
    start_date: managed_by_centralized_config
  enabled: true
  max_data_age_hours: 24
  max_retries: 3
  properties: all
  rate_limiting:
    delay_between_operations: 30
    delay_between_properties: 10
    delay_on_rate_limit: 300
    max_api_calls_per_minute: 60
  refresh_times:
  - 01:00
  - '13:22'
  retry_delay_minutes: 1
  smart_refresh: true
  timezone: Europe/Lisbon
