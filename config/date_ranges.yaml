# Centralized Date Range Configuration
# This file manages all date ranges used throughout the pricing tool

# Current year configuration
current_year: 2026

# Data generation ranges
data_generation:
  # Full calculation range - used for comprehensive rate calculations
  # When full_start_days_back is set, start = today - N days; otherwise use fixed full_start_date
  full_start_days_back: 30
  full_start_date: "2026-01-01"  # Fallback when full_start_days_back not set
  full_end_date: "2027-01-03"
  
  # Operational range - used for daily operations and data pulls
  operational_start_date: "2026-01-01"
  operational_end_date: "2027-01-03"
  
  # User interface range - default range shown in UI when app loads
  # When ui_default_days_ahead is set, default is today to today + N days (e.g. 60)
  ui_default_days_ahead: 60
  # Fallback fixed dates when ui_default_days_ahead is not set
  ui_default_start_date: "2026-01-01"
  ui_default_end_date: "2027-01-03"

# Dynamic calculation settings
dynamic_calculations:
  # Scheduler / nightly pull / PL daily end date (fixed; used when set)
  scheduler_end_date: "2027-01-03"
  # Scheduler dynamic range: last month to end (scheduler_end_date or offset)
  scheduler_start_offset_months: -1  # -1 = last month
  scheduler_end_offset_months: 0     # 0 = end of current year (ignored if scheduler_end_date set)
  
  # Nightly pull range: same start as bulk processing to +492 days (end capped at scheduler_end_date when set)
  nightly_pull_days_ahead: 492
  nightly_pull_use_bulk_start: true  # Use same start date as bulk processing
  
  # Bulk processing range: 30 days ago to end of current year + 15 months (extended for rate pushes)
  bulk_processing_days_back: 30
  bulk_processing_end_offset_months: 15   # Extended to cover February 2027

# API operations
api_operations:
  # Default range for manual API calls
  default_start_date: "2026-01-01"
  default_end_date: "2027-01-03"
  
  # Maximum range for API calls (safety limit)
  max_start_date: "2025-09-01"
  max_end_date: "2027-01-03"

# Data retention
data_retention:
  # Maximum age for data before refresh (hours)
  max_data_age_hours: 24
  
  # Archive retention (days)
  archive_retention_days: 365

# Validation rules
validation:
  # Minimum date range (days)
  min_range_days: 1
  
  # Maximum date range (days)
  max_range_days: 1095  # ~3 years
  
  # Future date limit (days from today)
  max_future_days: 730  # ~2 years
